<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>MONSTER QUEST :: AR</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --bg:#05070f;
  --bg-2:#0d1020;
  --panel:#0b1226;
  --panel-2:#141b38;
  --line:#1e2a52;
  --line-bright:#3850a8;
  --cyan:#00d9ff;
  --cyan-dim:#0a7a94;
  --magenta:#ff2bd6;
  --gold:#ffb41f;
  --red:#ff3b5c;
  --green:#32ff9a;
  --text:#e5ecff;
  --text-dim:#6a7aa8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;user-select:none;-webkit-user-select:none;font-weight:500}

/* Scanline overlay for retro-game feel */
body::before{
content:’’;position:fixed;inset:0;pointer-events:none;z-index:200;
background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,217,255,0.015) 2px,rgba(0,217,255,0.015) 3px);
mix-blend-mode:overlay;
}
/* Vignette */
body::after{
content:’’;position:fixed;inset:0;pointer-events:none;z-index:199;
background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.65) 100%);
}

#map{position:absolute;inset:0;background:#05070f;filter:saturate(0.85) brightness(0.85) contrast(1.1)}

/* Leaflet overrides for game feel */
.leaflet-container{background:#05070f;font-family:inherit}
.leaflet-control-attribution{background:rgba(11,18,38,0.8)!important;color:var(–text-dim)!important;font-size:8px!important;border:1px solid var(–line)}
.leaflet-control-attribution a{color:var(–cyan-dim)!important}

/* ============ HUD ============ */
#hud{position:absolute;inset:0;pointer-events:none;z-index:5}

.hud-top{position:absolute;top:calc(env(safe-area-inset-top) + 10px);left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;gap:10px}

/* Angular cut-corner panels */
.gpanel{
position:relative;
background:linear-gradient(135deg,rgba(11,18,38,0.92),rgba(20,27,56,0.92));
border:1px solid var(–cyan);
clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
box-shadow:0 0 0 1px rgba(0,0,0,0.4),inset 0 1px 0 rgba(0,217,255,0.3),0 4px 20px rgba(0,0,0,0.5);
}
.gpanel::before{
content:’’;position:absolute;top:0;left:10px;right:10px;height:1px;background:linear-gradient(90deg,transparent,var(–cyan),transparent);opacity:0.8;
}

.player-card{
padding:10px 14px 10px 12px;display:flex;align-items:center;gap:10px;pointer-events:auto;min-width:180px;
}
.player-avatar{
width:40px;height:40px;
background:linear-gradient(135deg,var(–gold),#ff5e33);
clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
display:flex;align-items:center;justify-content:center;font-size:20px;
position:relative;
}
.player-info{flex:1;min-width:0}
.player-name{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(–text)}
.player-tag{font-size:9px;letter-spacing:1.5px;color:var(–cyan);font-weight:700;margin-top:1px}
.xp-row{display:flex;align-items:center;gap:6px;margin-top:5px}
.xp-bar{flex:1;height:4px;background:rgba(0,217,255,0.1);border:1px solid var(–line);position:relative;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(–cyan),var(–magenta));width:0%;box-shadow:0 0 6px var(–cyan);transition:width 0.5s cubic-bezier(0.2,0.9,0.3,1)}
.xp-num{font-size:9px;color:var(–text-dim);letter-spacing:1px;font-variant-numeric:tabular-nums;min-width:36px;text-align:right}

.top-right{display:flex;flex-direction:column;gap:8px;pointer-events:auto;align-items:flex-end}
.hex-btn{
width:44px;height:44px;
background:linear-gradient(135deg,var(–panel),var(–panel-2));
border:1px solid var(–cyan);
clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);
display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;
transition:all 0.15s;color:var(–cyan);
box-shadow:0 0 10px rgba(0,217,255,0.2);
}
.hex-btn:active{transform:scale(0.9);background:var(–cyan);color:var(–bg)}
.hex-btn.alert{border-color:var(–gold);color:var(–gold);box-shadow:0 0 12px rgba(255,180,31,0.4);animation:alertPulse 1.6s infinite}
@keyframes alertPulse{50%{box-shadow:0 0 18px rgba(255,180,31,0.7)}}

/* Bottom scanner bar */
.hud-bottom{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 12px);left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-end;gap:10px;pointer-events:none}

.scanner{
pointer-events:auto;padding:8px 14px;
display:flex;align-items:center;gap:10px;
font-size:10px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;
flex:1;
}
.scan-dot{width:8px;height:8px;background:var(–green);box-shadow:0 0 8px var(–green);animation:scanPulse 1.4s infinite}
@keyframes scanPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.4)}}
.scan-txt{color:var(–text);flex:1}
.scan-count{color:var(–cyan);font-weight:800;font-size:14px;font-variant-numeric:tabular-nums}

.compass{
pointer-events:auto;width:56px;height:56px;
position:relative;display:flex;align-items:center;justify-content:center;
}
.compass-ring{position:absolute;inset:0;border:1px solid var(–cyan);border-radius:50%;opacity:0.4}
.compass-ring.r2{inset:8px;opacity:0.6}
.compass-ring.r3{inset:16px;opacity:0.8}
.compass-n{position:absolute;top:2px;font-size:8px;font-weight:900;color:var(–cyan);letter-spacing:1px}
.compass-dot{width:6px;height:6px;background:var(–gold);border-radius:50%;box-shadow:0 0 6px var(–gold)}

/* ============ LEAFLET MARKERS ============ */
.player-marker{
width:24px;height:24px;position:relative;
}
.player-marker .pm-core{
position:absolute;inset:6px;background:var(–cyan);border-radius:50%;
box-shadow:0 0 0 2px var(–bg),0 0 12px var(–cyan);
}
.player-marker .pm-ring{
position:absolute;inset:-8px;border:2px solid var(–cyan);border-radius:50%;
animation:pRing 2s infinite ease-out;
}
@keyframes pRing{0%{transform:scale(0.5);opacity:1}100%{transform:scale(2);opacity:0}}
.player-marker .pm-dir{
position:absolute;top:-2px;left:50%;transform:translateX(-50%);
width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:8px solid var(–cyan);
filter:drop-shadow(0 0 4px var(–cyan));
}

.creature-marker{
width:52px;height:58px;position:relative;cursor:pointer;pointer-events:auto;
animation:cFloat 2.6s infinite ease-in-out;
}
@keyframes cFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.cm-hex{
position:absolute;inset:0 0 8px 0;
background:linear-gradient(135deg,var(–c1),var(–c2));
clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
display:flex;align-items:center;justify-content:center;font-size:26px;
filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));
}
.cm-hex::before{
content:’’;position:absolute;inset:2px;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent 50%);
clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
}
.cm-cp{
position:absolute;bottom:0;left:50%;transform:translateX(-50%);
background:var(–bg);border:1px solid var(–c1);padding:1px 5px;
font-size:8px;font-weight:800;letter-spacing:0.5px;white-space:nowrap;
color:var(–c1);
}
.cm-rarity{
position:absolute;top:-2px;right:-2px;font-size:7px;letter-spacing:0.5px;
background:var(–gold);color:var(–bg);padding:1px 3px;font-weight:900;
}

/* ============ ENCOUNTER ============ */
#encounter{position:absolute;inset:0;display:none;z-index:50;background:#000;touch-action:none}
#encounter.active{display:block}
#encounter-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
#encounter-ui{position:absolute;inset:0;pointer-events:none}

.enc-header{position:absolute;top:calc(env(safe-area-inset-top) + 10px);left:10px;right:10px;display:flex;justify-content:space-between;gap:10px;pointer-events:none}

.enc-nameplate{flex:1;padding:10px 14px;pointer-events:auto;min-width:0}
.enc-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.enc-name{font-size:15px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.enc-type{font-size:8px;padding:2px 7px;letter-spacing:1px;font-weight:900;text-transform:uppercase;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);background:var(–type-color);color:var(–bg)}
.enc-stats{display:flex;gap:10px;font-size:9px;letter-spacing:1px}
.enc-stat{display:flex;gap:4px;align-items:center}
.enc-stat-label{color:var(–text-dim);text-transform:uppercase}
.enc-stat-val{color:var(–cyan);font-weight:800;font-variant-numeric:tabular-nums}
.enc-stat-val.gold{color:var(–gold)}

.flee-btn{
pointer-events:auto;
padding:10px 14px;cursor:pointer;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
background:linear-gradient(135deg,var(–panel),var(–panel-2));
border:1px solid var(–red);color:var(–red);
clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}
.flee-btn:active{background:var(–red);color:var(–bg)}

/* HP bar for creature */
.enc-hpbar{
position:absolute;top:calc(env(safe-area-inset-top) + 72px);left:50%;transform:translateX(-50%);
width:220px;pointer-events:none;
}
.hp-label{font-size:9px;letter-spacing:2px;color:var(–cyan);font-weight:800;margin-bottom:3px;text-align:center;text-transform:uppercase}
.hp-track{height:6px;background:rgba(0,0,0,0.7);border:1px solid var(–cyan);position:relative;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.hp-fill{position:absolute;inset:0;background:linear-gradient(90deg,var(–green),var(–gold) 70%,var(–red));width:100%;transition:width 0.4s;box-shadow:0 0 8px var(–cyan)}

/* Catch ring / targeting */
.target-reticle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:240px;height:240px;pointer-events:none;opacity:0;transition:opacity 0.3s}
.target-reticle.show{opacity:1}
.reticle-ring{position:absolute;inset:0;border:2px dashed var(–cyan);border-radius:50%;opacity:0.3;animation:reticleSpin 10s linear infinite}
.reticle-inner{position:absolute;inset:40px;border:1px solid var(–cyan);border-radius:50%;animation:reticlePulse 2s infinite ease-in-out}
.reticle-cross{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(–cyan);font-size:10px;letter-spacing:2px;font-weight:800;margin-top:-110px}
.reticle-corners{position:absolute;inset:0}
.reticle-corner{position:absolute;width:20px;height:20px;border:2px solid var(–cyan)}
.reticle-corner.tl{top:-2px;left:-2px;border-right:none;border-bottom:none}
.reticle-corner.tr{top:-2px;right:-2px;border-left:none;border-bottom:none}
.reticle-corner.bl{bottom:-2px;left:-2px;border-right:none;border-top:none}
.reticle-corner.br{bottom:-2px;right:-2px;border-left:none;border-top:none}
@keyframes reticleSpin{to{transform:rotate(360deg)}}
@keyframes reticlePulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(0.85);opacity:1}}

.swipe-hint{
position:absolute;bottom:140px;left:50%;transform:translateX(-50%);
font-size:10px;letter-spacing:3px;font-weight:800;text-transform:uppercase;color:var(–cyan);
pointer-events:none;text-align:center;
animation:hintBob 1.8s infinite;
text-shadow:0 0 8px var(–cyan);
}
.swipe-hint .arrow{display:block;font-size:18px;margin-bottom:2px;animation:arrowBob 1.8s infinite}
@keyframes hintBob{0%,100%{opacity:0.8}50%{opacity:1}}
@keyframes arrowBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Ball selector */
.ball-selector{
position:absolute;bottom:calc(env(safe-area-inset-bottom) + 14px);left:0;right:0;
display:flex;justify-content:center;gap:10px;pointer-events:auto;
}
.ball-slot{
width:58px;height:58px;position:relative;cursor:pointer;
background:linear-gradient(135deg,var(–panel),var(–panel-2));
border:1px solid var(–line-bright);
clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
display:flex;align-items:center;justify-content:center;
transition:all 0.15s;
}
.ball-slot.active{border-color:var(–cyan);box-shadow:0 0 14px rgba(0,217,255,0.4)}
.ball-slot.disabled{opacity:0.35;pointer-events:none}
.ball-icon{width:34px;height:34px;border-radius:50%;position:relative;overflow:hidden;box-shadow:inset -4px -6px 10px rgba(0,0,0,0.3)}
.ball-icon::before{content:’’;position:absolute;inset:0;background:linear-gradient(180deg,var(–top) 0%,var(–top) 48%,#0a0a0a 48%,#0a0a0a 52%,#f0f4ff 52%,#f0f4ff 100%)}
.ball-icon::after{content:’’;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #0a0a0a;box-shadow:inset 1px 1px 2px rgba(0,0,0,0.4)}
.ball-count{
position:absolute;top:-3px;right:-3px;
background:var(–gold);color:var(–bg);
font-size:9px;font-weight:900;padding:2px 5px;letter-spacing:0.5px;
clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);
min-width:22px;text-align:center;
}
.ball-label{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:1px;font-weight:700;color:var(–text-dim);text-transform:uppercase;white-space:nowrap}
.ball-slot.active .ball-label{color:var(–cyan)}

/* ============ CAPTURE RESULT ============ */
#capture-result{
position:absolute;inset:0;display:none;z-index:60;
background:radial-gradient(circle at center,rgba(0,217,255,0.15),rgba(0,0,0,0.96) 70%);
align-items:center;justify-content:center;flex-direction:column;gap:16px;
padding:40px 20px;
}
#capture-result.show{display:flex;animation:fadeIn 0.35s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.result-emoji-frame{
width:140px;height:140px;position:relative;display:flex;align-items:center;justify-content:center;
background:linear-gradient(135deg,var(–panel),var(–panel-2));
border:2px solid var(–gold);
clip-path:polygon(20px 0,100% 0,100% calc(100% - 20px),calc(100% - 20px) 100%,0 100%,0 20px);
box-shadow:0 0 30px rgba(255,180,31,0.4);
animation:resultPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes resultPop{from{transform:scale(0.3) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.result-emoji{font-size:72px;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.5))}
.result-title{
font-size:36px;font-weight:900;letter-spacing:6px;text-transform:uppercase;
background:linear-gradient(90deg,var(–gold),var(–magenta));
-webkit-background-clip:text;background-clip:text;color:transparent;
text-shadow:0 0 30px rgba(255,180,31,0.3);
}
.result-sub{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(–text-dim);text-align:center}
.result-xp{font-size:18px;font-weight:900;color:var(–cyan);letter-spacing:3px;margin-top:4px;text-shadow:0 0 10px var(–cyan)}
.result-continue{
margin-top:12px;padding:14px 36px;cursor:pointer;
background:linear-gradient(135deg,var(–cyan),var(–magenta));color:var(–bg);
font-size:12px;font-weight:900;letter-spacing:3px;text-transform:uppercase;border:none;
clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
box-shadow:0 0 20px rgba(0,217,255,0.4);
}

/* ============ COLLECTION ============ */
#collection{position:absolute;inset:0;display:none;z-index:55;background:linear-gradient(180deg,#05070f 0%,#0d0820 100%);overflow-y:auto;-webkit-overflow-scrolling:touch}
#collection.active{display:block}
.coll-header{
position:sticky;top:0;
background:rgba(5,7,15,0.96);
padding:calc(env(safe-area-inset-top) + 14px) 14px 12px;
display:flex;justify-content:space-between;align-items:center;
border-bottom:1px solid var(–line);z-index:2;
}
.coll-header::after{
content:’’;position:absolute;bottom:-1px;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(–cyan),transparent);
}
.coll-title{font-size:20px;font-weight:900;letter-spacing:4px;color:var(–cyan);text-shadow:0 0 10px var(–cyan)}
.coll-sub{font-size:9px;letter-spacing:2px;color:var(–text-dim);margin-top:2px}
.coll-sub .num{color:var(–gold);font-weight:900}
.close-btn{
width:36px;height:36px;cursor:pointer;
background:linear-gradient(135deg,var(–panel),var(–panel-2));
border:1px solid var(–red);color:var(–red);
clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
font-size:16px;
}

.coll-grid{padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.coll-card{
aspect-ratio:1;position:relative;cursor:pointer;
background:linear-gradient(180deg,var(–panel),var(–panel-2));
border:1px solid var(–line-bright);
clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;
}
.coll-card.caught{border-color:var(–c-border,var(–cyan))}
.coll-card.locked .coll-emoji{filter:brightness(0.2) blur(2px)}
.coll-card::before{
content:’’;position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,var(–c-glow,transparent) 0%,transparent 60%);opacity:0.6;
}
.coll-num{position:absolute;top:4px;left:6px;font-size:7px;letter-spacing:1px;color:var(–text-dim);font-weight:800;z-index:1}
.coll-emoji{font-size:36px;position:relative;z-index:1;margin-bottom:4px}
.coll-name{font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;position:relative;z-index:1;color:var(–text)}
.coll-card.locked .coll-name{color:var(–text-dim)}
.coll-meta{font-size:8px;color:var(–text-dim);margin-top:2px;position:relative;z-index:1;letter-spacing:0.5px}
.coll-card.caught .coll-meta{color:var(–c-border)}
.coll-rarity{position:absolute;top:4px;right:6px;font-size:7px;letter-spacing:0.5px;color:var(–gold);font-weight:900;z-index:1}

/* ============ SPLASH ============ */
#splash{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#1a0a3e,#05070f 80%);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:150;gap:14px;padding:40px}
#splash::before{
content:’’;position:absolute;inset:0;
background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,217,255,0.03) 3px,rgba(0,217,255,0.03) 4px),
repeating-linear-gradient(90deg,transparent 0,transparent 40px,rgba(255,43,214,0.04) 40px,rgba(255,43,214,0.04) 41px);
pointer-events:none;
}
#splash.hide{animation:splashOut 0.6s forwards}
@keyframes splashOut{to{opacity:0;pointer-events:none}}
.splash-brand{font-size:11px;letter-spacing:6px;color:var(–cyan);font-weight:800;margin-bottom:-4px}
.splash-title{
font-size:38px;font-weight:900;letter-spacing:6px;text-transform:uppercase;
background:linear-gradient(90deg,var(–gold),var(–red) 40%,var(–magenta) 70%,var(–cyan));
-webkit-background-clip:text;background-clip:text;color:transparent;
text-shadow:0 0 40px rgba(255,43,214,0.3);
}
.splash-ver{font-size:10px;letter-spacing:3px;color:var(–text-dim);font-weight:700}
.splash-box{
margin-top:20px;padding:14px 20px;min-width:260px;
background:linear-gradient(135deg,rgba(11,18,38,0.8),rgba(20,27,56,0.8));
border:1px solid var(–cyan);
clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
position:relative;
}
.splash-status{font-size:10px;letter-spacing:2px;color:var(–text-dim);text-transform:uppercase;margin-bottom:8px}
.splash-status::before{content:‘▸ ‘;color:var(–cyan)}
.splash-progress{height:3px;background:rgba(0,217,255,0.1);border:1px solid var(–cyan-dim);overflow:hidden;position:relative}
.splash-progress::after{content:’’;position:absolute;top:0;bottom:0;width:30%;background:var(–cyan);animation:progSlide 1.4s linear infinite;box-shadow:0 0 6px var(–cyan)}
@keyframes progSlide{from{left:-30%}to{left:100%}}

<script>
// ============================================================

window.addEventListener('error', function(e){

window.addEventListener('unhandledrejection', function(e){ console.log('[promise]', e.reason); });

// ---- CREATURE DATABASE ----
var CREATURES = [
  {id:'emberpup',   name:'Emberpup',   emoji:'🔥', type:'Fire',     color:'#ff5a3c', colorAlt:'#ff9966', rarity:1, cpRange:[80,420],   habitat:'Urban'},

  {id:'zapmouse',   name:'Zapmouse',   emoji:'⚡', type:'Volt',     color:'#ffd93d', colorAlt:'#fff08a', rarity:2, cpRange:[120,520],  habitat:'Streets'},
  {id:'boulderback',name:'Boulderback',emoji:'🪨', type:'Stone',    color:'#a08560', colorAlt:'#c9b28a', rarity:2, cpRange:[140,540],  habitat:'Construction'},
  {id:'skywing',    name:'Skywing',    emoji:'🌀', type:'Aero',     color:'#b39dff', colorAlt:'#d5c6ff', rarity:2, cpRange:[110,500],  habitat:'Rooftops'},
  {id:'nightpaw',   name:'Nightpaw',   emoji:'🌑', type:'Shadow',   color:'#6a4ac9', colorAlt:'#9c7cea', rarity:3, cpRange:[180,680],  habitat:'Alleys'},
  {id:'crystallo',  name:'Crystallo',  emoji:'💎', type:'Crystal',  color:'#ff6bcf', colorAlt:'#ffb0e0', rarity:3, cpRange:[200,720],  habitat:'Caves'},
  {id:'frostcub',   name:'Frostcub',   emoji:'❄️', type:'Frost',    color:'#a3e8ff', colorAlt:'#d9f5ff', rarity:2, cpRange:[130,540],  habitat:'Cold Zones'},
  {id:'mystifox',   name:'Mystifox',   emoji:'🔮', type:'Psyche',   color:'#e066ff', colorAlt:'#f0a6ff', rarity:3, cpRange:[210,740],  habitat:'Shrines'},
  {id:'magmaworm',  name:'Magmaworm',  emoji:'🌋', type:'Magma',    color:'#ff7a22', colorAlt:'#ffb070', rarity:3, cpRange:[230,780],  habitat:'Industrial'},
  {id:'gleamdrake', name:'Gleamdrake', emoji:'✨', type:'Radiant',  color:'#ffee55', colorAlt:'#fff8aa', rarity:4, cpRange:[340,980],  habitat:'Rare'}
];

// ---- GAME STATE ----
var state = {
  player:{lat:null,lng:null,xp:0,level:1},
  caught:{},
  spawns:[],
  markers:[],
  balls:[Infinity, 8, 3],
  selectedBall:0,
  currentSpawn:null,
  map:null,
  playerMarker:null,
  mapInitialized:false,
  encounterActive:false
};
CREATURES.forEach(function(c){ state.caught[c.id] = {count:0, bestCP:0}; });

function setStatus(s){ var el=document.getElementById('splash-status'); if(el) el.textContent = s; }
function hideSplash(){ var s=document.getElementById('splash'); if (s && !s.classList.contains('hide')) s.classList.add('hide'); }

// ============================================================
//  MAP (LEAFLET)
// ============================================================
function initMap(lat, lng){
  if (state.mapInitialized) return;
  state.mapInitialized = true;

  try {
    state.map = L.map('map', {
      center:[lat, lng],
      zoom:17,
      zoomControl:false,
      attributionControl:true,
      dragging:true,
      tap:true
    });

    // Dark tile layer (CartoDB dark_all - reliable)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png', {
      attribution:'© OSM © CARTO',
      subdomains:'abcd',
      maxZoom:19,
      crossOrigin:true
    }).addTo(state.map);

    addPlayerMarker(lat, lng);
    spawnNearby(lat, lng, 10);
    fetchBuildings(lat, lng);

    setTimeout(hideSplash, 400);
  } catch (err) {
    console.error('Map init failed:', err);
    setStatus('Map offline - entering demo mode');
    setTimeout(hideSplash, 600);
  }
}

function addPlayerMarker(lat, lng){
  var html = '<div class="player-marker"><div class="pm-ring"></div><div class="pm-dir"></div><div class="pm-core"></div></div>';
  var icon = L.divIcon({html:html, className:'', iconSize:[24,24], iconAnchor:[12,12]});
  state.playerMarker = L.marker([lat,lng], {icon:icon, interactive:false, zIndexOffset:1000}).addTo(state.map);
}

function updatePlayerMarker(lat, lng){
  if (state.playerMarker) state.playerMarker.setLatLng([lat, lng]);
}

// Fetch OSM building footprints and render as translucent polygons
function fetchBuildings(lat, lng){
  var radius = 0.0035;
  var bbox = (lat-radius)+','+(lng-radius)+','+(lat+radius)+','+(lng+radius);
  var query = '[out:json][timeout:10];(way["building"]('+bbox+'););out geom 150;';
  var url = 'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query);

  fetch(url).then(function(r){ return r.json(); }).then(function(data){
    if (!data || !data.elements || !state.map) return;
    data.elements.forEach(function(el){
      if (!el.geometry || el.geometry.length < 3) return;
      var coords = el.geometry.map(function(p){ return [p.lat, p.lon]; });
      var levels = 2;
      if (el.tags){
        if (el.tags['building:levels']) levels = parseFloat(el.tags['building:levels']) || 2;
        else if (el.tags.height) levels = Math.max(1, (parseFloat(el.tags.height)||6) / 3.2);
      }
      var opacity = Math.min(0.35, 0.12 + levels * 0.025);
      L.polygon(coords, {
        color: '#3850a8',
        weight: 1,
        fillColor: levels > 8 ? '#506388' : levels > 4 ? '#3a4a70' : '#2a3a5c',
        fillOpacity: opacity,
        interactive:false
      }).addTo(state.map);
    });
    console.log('[buildings]', data.elements.length);
  }).catch(function(err){ console.log('[buildings fail]', err); });
}

// ============================================================
//  SPAWN CREATURES
// ============================================================
function spawnNearby(lat, lng, count){
  state.markers.forEach(function(m){ m.remove(); });
  state.markers = [];
  state.spawns = [];

  for (var i=0;i<count;i++){
    var pool = CREATURES.filter(function(c){ return Math.random() < (1 / c.rarity); });
    var creature = pool.length ? pool[Math.floor(Math.random()*pool.length)] : CREATURES[Math.floor(Math.random()*3)];

    var dLat = (Math.random()-0.5) * 0.004;
    var dLng = (Math.random()-0.5) * 0.004;
    var spawn = {
      creature: creature,
      lat: lat + dLat,
      lng: lng + dLng,
      cp: Math.floor(creature.cpRange[0] + Math.random()*(creature.cpRange[1]-creature.cpRange[0])),
      id: 'spawn_' + i + '_' + Date.now()
    };
    state.spawns.push(spawn);

    var html = 
      '<div class="creature-marker" style="--c1:'+creature.color+';--c2:'+creature.colorAlt+'">'+
        '<div class="cm-hex">'+creature.emoji+'</div>'+
        '<div class="cm-cp">CP '+spawn.cp+'</div>'+
        (creature.rarity >= 3 ? '<div class="cm-rarity">'+('★').repeat(creature.rarity)+'</div>' : '')+
      '</div>';
    var icon = L.divIcon({html:html, className:'', iconSize:[52,58], iconAnchor:[26,58]});
    var marker = L.marker([spawn.lat, spawn.lng], {icon:icon, zIndexOffset: 100 + i}).addTo(state.map);
    (function(sp){
      marker.on('click', function(e){
        L.DomEvent.stopPropagation(e);
        startEncounter(sp);
      });
    })(spawn);
    state.markers.push(marker);
  }
  updateScannerText();
}

function updateScannerText(){
  var n = state.spawns.length;
  document.getElementById('scan-count').textContent = String(n).padStart(2,'0');
  document.getElementById('scan-txt').textContent = n ? 'Entities detected' : 'No entities - move around';
}

function removeSpawn(spawn){
  var idx = state.spawns.indexOf(spawn);
  if (idx >= 0){
    state.spawns.splice(idx,1);
    if (state.markers[idx]){
      state.markers[idx].remove();
      state.markers.splice(idx,1);
    }
    updateScannerText();
  }
}

// ============================================================
//  GEOLOCATION
// ============================================================
function startGeoTracking(){
  setStatus('Acquiring GPS signal');
  if (!navigator.geolocation){
    setStatus('GPS unsupported - demo location');
    useFallback();
    return;
  }
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat = pos.coords.latitude, lng = pos.coords.longitude;
    state.player.lat = lat; state.player.lng = lng;
    setStatus('Location locked - loading map');
    initMap(lat, lng);
    navigator.geolocation.watchPosition(function(p){
      state.player.lat = p.coords.latitude; state.player.lng = p.coords.longitude;
      updatePlayerMarker(p.coords.latitude, p.coords.longitude);
    }, null, {enableHighAccuracy:true, maximumAge:3000});
  }, function(){
    setStatus('GPS denied - using demo location');
    useFallback();
  }, {enableHighAccuracy:true, timeout:8000});
}

function useFallback(){
  var lat = 40.7580, lng = -73.9855;
  state.player.lat = lat; state.player.lng = lng;
  setTimeout(function(){ initMap(lat, lng); }, 500);
}

// ============================================================
//  THREE.JS + CEL SHADING
// ============================================================
var scene, camera, renderer, creatureMesh, ballMesh;
var clock = new THREE.Clock();
var particles = [];
var ballState = null;
var animationFrame = null;
var threeInitialized = false;
var gradientMap; // cel-shading gradient

function createToonGradient(){
  // 4-step hard gradient for proper cel/toon shading
  var data = new Uint8Array([50, 130, 210, 255]);
  var tex = new THREE.DataTexture(data, 4, 1, THREE.LuminanceFormat);
  tex.minFilter = THREE.NearestFilter;
  tex.magFilter = THREE.NearestFilter;
  tex.generateMipmaps = false;
  tex.needsUpdate = true;
  return tex;
}

function toonMat(color, emissive){
  return new THREE.MeshToonMaterial({
    color:color,
    emissive:emissive || 0x000000,
    emissiveIntensity:0.5,
    gradientMap: gradientMap
  });
}

function initThree(){
  if (threeInitialized) return;
  threeInitialized = true;
  gradientMap = createToonGradient();

  var canvas = document.getElementById('encounter-canvas');
  renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x050710, 1);

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x1a0f2e, 10, 28);

  camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 0.1, 60);
  camera.position.set(0, 1.6, 6);
  camera.lookAt(0, 1.3, 0);

  // Lighting - key + rim + ambient for toon shading
  var ambient = new THREE.AmbientLight(0x4a5580, 0.55);
  scene.add(ambient);

  var key = new THREE.DirectionalLight(0xffffff, 1.1);
  key.position.set(3, 6, 4);
  scene.add(key);

  var rim = new THREE.DirectionalLight(0xff4dcc, 0.8);
  rim.position.set(-4, 2, -3);
  scene.add(rim);

  var fill = new THREE.DirectionalLight(0x00d9ff, 0.4);
  fill.position.set(-3, 1, 4);
  scene.add(fill);

  addBackdrop();
  addArena();

  window.addEventListener('resize', function(){
    if (!renderer) return;
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
  });
}

function addBackdrop(){
  // Skydome with custom gradient
  var skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms:{
      top:{value:new THREE.Color(0x1a0835)},
      mid:{value:new THREE.Color(0x3d1a6e)},
      bot:{value:new THREE.Color(0x0a0720)}
    },
    vertexShader:'varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader:'uniform vec3 top,mid,bot; varying vec3 vP; void main(){ float y=normalize(vP).y; vec3 c = y>0.0 ? mix(mid,top,y) : mix(mid,bot,-y); gl_FragColor=vec4(c,1.0); }'
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(35,32,16), skyMat));

  // Stars
  var starGeo = new THREE.BufferGeometry();
  var pos = [];
  for (var i=0;i<500;i++){
    var phi = Math.acos(2*Math.random()-1);
    var theta = Math.random()*Math.PI*2;
    var r = 28;
    pos.push(r*Math.sin(phi)*Math.cos(theta), Math.abs(r*Math.cos(phi)), r*Math.sin(phi)*Math.sin(theta));
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  var stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.07, transparent:true, opacity:0.9}));
  scene.add(stars);
}

function addArena(){
  // Circular battle platform
  var platform = new THREE.Mesh(new THREE.CylinderGeometry(6, 6.2, 0.3, 48), toonMat(0x1a2045));
  platform.position.y = -0.15;
  scene.add(platform);

  // Rings on platform (tech pattern)
  [5.5, 4.5, 3.2].forEach(function(r, i){
    var ring = new THREE.Mesh(
      new THREE.RingGeometry(r-0.03, r, 48),
      new THREE.MeshBasicMaterial({color: i===0 ? 0x00d9ff : (i===1 ? 0xff2bd6 : 0xffb41f), side:THREE.DoubleSide, transparent:true, opacity:0.6})
    );
    ring.rotation.x = -Math.PI/2;
    ring.position.y = 0.01 + i*0.001;
    scene.add(ring);
  });

  // Hex grid tiles scattered around
  for (var i=0;i<12;i++){

    var hex = new THREE.Mesh(
      new THREE.CylinderGeometry(0.25, 0.25, 0.05, 6),
      toonMat(0x1e2a52)
    );
    hex.position.set(Math.cos(a)*r, 0.025, Math.sin(a)*r);

  }

  // Floor glow
  var glowGeo = new THREE.CircleGeometry(3, 32);
  var glowMat = new THREE.MeshBasicMaterial({color:0x00d9ff, transparent:true, opacity:0.08, side:THREE.DoubleSide});
  var glow = new THREE.Mesh(glowGeo, glowMat);
  glow.rotation.x = -Math.PI/2;
  glow.position.y = 0.015;
  scene.add(glow);
}

// Cel outline via inverted-hull backside mesh
function addOutline(group, thickness){
  thickness = thickness || 1.045;
  var outlineMat = new THREE.MeshBasicMaterial({color:0x000000, side:THREE.BackSide});
  group.traverse(function(child){
    if (child.isMesh && child.geometry && !child.userData.isOutline){
      var outline = new THREE.Mesh(child.geometry, outlineMat);
      outline.scale.setScalar(thickness);
      outline.userData.isOutline = true;
      child.add(outline);
    }
  });
}

// ============================================================
//  ENCOUNTER FLOW
// ============================================================
function startEncounter(spawn){
  if (state.encounterActive) return;
  state.encounterActive = true;
  state.currentSpawn = spawn;
  var c = spawn.creature;

  initThree();

  // clean previous
  if (creatureMesh){ scene.remove(creatureMesh); creatureMesh = null; }
  if (ballMesh){ scene.remove(ballMesh); ballMesh = null; }
  particles.forEach(function(p){ scene.remove(p.mesh); });
  particles = [];

  // build creature
  creatureMesh = (BUILDERS[c.id] || buildEmberpup)();
  creatureMesh.position.set(0, 0, 0);
  creatureMesh.scale.setScalar(1);
  creatureMesh.visible = true;
  scene.add(creatureMesh);

  // build ball
  ballMesh = buildBall(state.selectedBall);
  resetBall();
  scene.add(ballMesh);
  ballState = null;

  // UI
  document.getElementById('enc-name').textContent = c.name;
  var tp = document.getElementById('enc-type');
  tp.textContent = c.type;
  tp.style.setProperty('--type-color', c.color);
  tp.style.background = c.color;
  document.getElementById('enc-cp').textContent = spawn.cp;
  document.getElementById('enc-rank').textContent = '★'.repeat(c.rarity);
  document.getElementById('hp-fill').style.width = '100%';
  document.getElementById('target-reticle').classList.add('show');
  document.getElementById('swipe-hint').style.display = 'block';
  updateBallCounts();

  document.getElementById('encounter').classList.add('active');

  if (animationFrame) cancelAnimationFrame(animationFrame);
  clock.start();
  renderLoop();
}

function endEncounter(){
  document.getElementById('encounter').classList.remove('active');
  document.getElementById('target-reticle').classList.remove('show');
  if (animationFrame){ cancelAnimationFrame(animationFrame); animationFrame = null; }
  state.currentSpawn = null;
  state.encounterActive = false;
}

function resetBall(){
  if (!ballMesh) return;
  ballMesh.visible = true;
  ballMesh.position.set(0, -1.1, 3.8);
  ballMesh.rotation.set(0,0,0);
  ballMesh.scale.setScalar(1);
}

// ============================================================
//  BALL PHYSICS
// ============================================================
function throwBall(vx, vy, vz, spinX, spinY){
  if (!ballMesh || ballState) return;
  ballState = {
    vel: new THREE.Vector3(vx, vy, vz),
    spin: new THREE.Vector3(spinX, spinY, 0),
    stage: 'flying',
    timer: 0,
    hitCreature: false
  };
  if (state.selectedBall > 0 && state.balls[state.selectedBall] > 0){
    state.balls[state.selectedBall]--;
    updateBallCounts();
  }
  document.getElementById('swipe-hint').style.display = 'none';
}

function updatePhysics(dt){
  if (!ballState || !ballMesh) return;

  if (ballState.stage === 'flying'){
    ballState.vel.y -= 9.8 * dt * 0.5;
    ballMesh.position.addScaledVector(ballState.vel, dt);
    ballMesh.rotation.x += ballState.spin.x * dt;
    ballMesh.rotation.y += ballState.spin.y * dt;
    ballMesh.rotation.z += ballState.spin.x * 0.5 * dt;

    // curve from spin (Magnus-ish)
    ballState.vel.x += ballState.spin.y * 0.015;

    var creaturePos = new THREE.Vector3(0, 1.2, 0);
    if (ballMesh.position.distanceTo(creaturePos) < 1.0 && !ballState.hitCreature){
      ballState.hitCreature = true;
      ballState.stage = 'capturing';
      ballState.timer = 0;
      spawnSparkles(creaturePos, 35, 0xffcc3d);
      spawnSparkles(creaturePos, 20, 0xffffff);
      ballMesh.position.copy(creaturePos);
      ballState.vel.set(0,0,0);
    }

    if (ballMesh.position.y < -3 || ballMesh.position.z < -7 || Math.abs(ballMesh.position.x) > 7){
      ballState.stage = 'miss'; ballState.timer = 0;
    }
  } else if (ballState.stage === 'capturing'){
    ballState.timer += dt;
    if (creatureMesh){
      var s = Math.max(0, 1 - ballState.timer*1.6);
      creatureMesh.scale.setScalar(s);
      creatureMesh.rotation.y += dt*5;
    }
    ballMesh.rotation.z = Math.sin(ballState.timer*22)*0.35;
    ballMesh.position.y = 1.2 + Math.sin(ballState.timer*9)*0.06;
    // HP drain visual
    var hpPct = Math.max(0, 100 - ballState.timer*100);
    document.getElementById('hp-fill').style.width = hpPct + '%';

    if (ballState.timer > 1.0){
      ballState.stage = 'wiggling'; ballState.timer = 0;
      if (creatureMesh) creatureMesh.visible = false;
    }
  } else if (ballState.stage === 'wiggling'){
    ballState.timer += dt;
    if (ballMesh.position.y > 0.27){
      ballState.vel.y -= 9.8*dt*0.5;
      ballMesh.position.addScaledVector(ballState.vel, dt);
    } else {
      ballMesh.position.y = 0.27;
      ballState.vel.y = 0;
      ballMesh.rotation.z = Math.sin(ballState.timer*12)*0.45;
      ballMesh.rotation.x = Math.sin(ballState.timer*9)*0.25;

      if (ballState.timer > 3.0){
        var spawn = state.currentSpawn;
        var ballBonus = [1.0, 1.5, 2.3][state.selectedBall];
        var cpFactor = 1 - (spawn.cp / 1100);
        var rarity = spawn.creature.rarity;
        var chance = Math.max(0.18, cpFactor * ballBonus / rarity);
        if (Math.random() < chance){
          ballState.stage = 'caught'; ballState.timer = 0;
          spawnSparkles(ballMesh.position, 80, 0xffb41f);
          spawnSparkles(ballMesh.position, 40, 0x00d9ff);
          spawnSparkles(ballMesh.position, 30, 0xffffff);
        } else {
          ballState.stage = 'escape'; ballState.timer = 0;
        }
      }
    }
  } else if (ballState.stage === 'caught'){
    ballState.timer += dt;
    ballMesh.position.y = 0.27 + ballState.timer*0.6;
    ballMesh.rotation.y += dt*4;
    if (ballState.timer > 1.2) completeCapture(true);
  } else if (ballState.stage === 'escape'){
    ballState.timer += dt;
    if (creatureMesh){
      creatureMesh.visible = true;
      creatureMesh.scale.setScalar(Math.min(1, ballState.timer*2));
    }
    ballMesh.visible = false;
    if (ballState.timer < 0.2) spawnSparkles(new THREE.Vector3(0,1.2,0), 20, 0xff3b5c);
    if (ballState.timer > 1.0){
      ballMesh.visible = true;
      resetBall();
      ballState = null;
      document.getElementById('swipe-hint').style.display = 'block';
      document.getElementById('hp-fill').style.width = '100%';
      showToast('BROKE FREE');
    }
  } else if (ballState.stage === 'miss'){
    ballState.timer += dt;
    if (ballState.timer > 0.5){
      resetBall(); ballState = null;
      document.getElementById('swipe-hint').style.display = 'block';
    }
  }
}

function completeCapture(success){
  var spawn = state.currentSpawn;
  if (!spawn) return;
  if (success){
    state.caught[spawn.creature.id].count++;
    if (spawn.cp > state.caught[spawn.creature.id].bestCP){
      state.caught[spawn.creature.id].bestCP = spawn.cp;
    }
    var xp = 100 + spawn.creature.rarity * 100 + Math.floor(spawn.cp/5);
    state.player.xp += xp;
    while (state.player.xp >= state.player.level * 1000){
      state.player.xp -= state.player.level * 1000;
      state.player.level++;
    }
    updateHUD();
    removeSpawn(spawn);
    showResult(true, spawn, xp);
  } else {
    showResult(false, spawn, 0);
  }
}

function showResult(success, spawn, xp){
  var el = document.getElementById('capture-result');
  document.getElementById('result-emoji').textContent = success ? spawn.creature.emoji : '💨';
  document.getElementById('result-title').textContent = success ? 'Gotcha!' : 'Got Away!';
  document.getElementById('result-sub').textContent = success ?
    (spawn.creature.name + ' was added to the Dex') :
    (spawn.creature.name + ' broke free and fled');
  document.getElementById('result-xp').textContent = success ? ('+' + xp + ' XP') : '';
  el.classList.add('show');
}

// ============================================================
//  PARTICLES
// ============================================================
function spawnSparkles(origin, count, color){
  for (var i=0;i<count;i++){
    var geo = new THREE.OctahedronGeometry(0.05 + Math.random()*0.06, 0);
    var mat = new THREE.MeshBasicMaterial({color:color, transparent:true, opacity:1});
    var m = new THREE.Mesh(geo, mat);
    m.position.copy(origin);
    var a = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
    var speed = 1.5 + Math.random()*3.5;
    scene.add(m);
    particles.push({
      mesh:m,
      vel:new THREE.Vector3(Math.sin(phi)*Math.cos(a)*speed, Math.cos(phi)*speed + 1.2, Math.sin(phi)*Math.sin(a)*speed),
      life:1.0, spin:(Math.random()-0.5)*12
    });
  }
}

function updateParticles(dt){
  for (var i=particles.length-1;i>=0;i--){
    var p = particles[i];
    p.life -= dt*1.4;
    if (p.life <= 0){
      scene.remove(p.mesh);
      particles.splice(i,1);
      continue;
    }
    p.mesh.position.addScaledVector(p.vel, dt);
    p.vel.y -= 3.5*dt;
    p.vel.multiplyScalar(0.98);
    p.mesh.rotation.x += p.spin*dt;
    p.mesh.rotation.y += p.spin*dt;
    p.mesh.material.opacity = p.life;
    p.mesh.scale.setScalar(0.5 + p.life*0.6);
  }
}

// ============================================================
//  RENDER LOOP
// ============================================================
function renderLoop(){
  animationFrame = requestAnimationFrame(renderLoop);
  var dt = Math.min(clock.getDelta(), 0.05);
  var t = clock.getElapsedTime();

  if (creatureMesh && creatureMesh.userData.animate) creatureMesh.userData.animate(t);

  updatePhysics(dt);
  updateParticles(dt);

  camera.position.x = Math.sin(t*0.3)*0.2;
  camera.position.y = 1.6 + Math.sin(t*0.5)*0.06;
  camera.lookAt(0, 1.3, 0);

  renderer.render(scene, camera);
}

// ============================================================
//  SWIPE INPUT
// ============================================================
var swipe = null;
function setupSwipe(){
  var canvas = document.getElementById('encounter-canvas');
  function onStart(e){
    e.preventDefault();
    var pt = e.touches ? e.touches[0] : e;
    if (ballState) return;
    swipe = {sx:pt.clientX, sy:pt.clientY, startT:performance.now(), points:[{x:pt.clientX,y:pt.clientY,t:performance.now()}]};
  }
  function onMove(e){
    if (!swipe || ballState) return;
    e.preventDefault();
    var pt = e.touches ? e.touches[0] : e;
    swipe.points.push({x:pt.clientX,y:pt.clientY,t:performance.now()});
    if (swipe.points.length > 20) swipe.points.shift();
  }
  function onEnd(e){
    if (!swipe || ballState) return;
    var endT = performance.now();
    var last = swipe.points[swipe.points.length-1];
    var dx = last.x - swipe.sx, dy = last.y - swipe.sy;
    var duration = (endT - swipe.startT)/1000;
    var dist = Math.hypot(dx, dy);
    swipe = null;
    if (dist < 40 || dy > 0) return;

    var speed = Math.min(dist/duration/100, 16);
    var aim = dx/150;
    var vx = aim * speed * 0.35;
    var vy = (Math.abs(dy)/150) * speed * 0.35;
    var vz = -Math.max(5.5, speed*0.9);
    var spinX = -speed*0.6;
    var spinY = aim * speed * 0.9;
    throwBall(vx, vy, vz, spinX, spinY);
  }
  canvas.addEventListener('touchstart', onStart, {passive:false});
  canvas.addEventListener('touchmove', onMove, {passive:false});
  canvas.addEventListener('touchend', onEnd);
  canvas.addEventListener('mousedown', onStart);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onEnd);
}

// ============================================================
//  UI HOOKS
// ============================================================
function updateHUD(){
  var needed = state.player.level * 1000;
  document.getElementById('xp-num').textContent = state.player.xp + '/' + (needed >= 1000 ? (needed/1000)+'K' : needed);
  document.getElementById('xp-fill').style.width = Math.min(100, (state.player.xp / needed)*100) + '%';
}

function updateBallCounts(){
  for (var i=0;i<3;i++){
    var el = document.getElementById('ball-count-'+i);
    if (el) el.textContent = i===0 ? '∞' : state.balls[i];
  }
  document.querySelectorAll('.ball-slot').forEach(function(s, i){
    s.classList.toggle('active', i===state.selectedBall);
    s.classList.toggle('disabled', i>0 && state.balls[i] <= 0);
  });
}

document.querySelectorAll('.ball-slot').forEach(function(el, i){
  el.addEventListener('click', function(){
    if (ballState) return;
    if (i > 0 && state.balls[i] <= 0){ showToast('No balls left'); return; }
    state.selectedBall = i;
    updateBallCounts();
    if (ballMesh){
      scene.remove(ballMesh);
      ballMesh = buildBall(state.selectedBall);
      resetBall();
      scene.add(ballMesh);
    }
  });
});

document.getElementById('enc-flee').addEventListener('click', function(e){ e.stopPropagation(); endEncounter(); });
document.getElementById('result-continue').addEventListener('click', function(){
  document.getElementById('capture-result').classList.remove('show');
  endEncounter();
});

document.getElementById('btn-collection').addEventListener('click', showCollection);
document.getElementById('coll-close').addEventListener('click', function(){
  document.getElementById('collection').classList.remove('active');
});
document.getElementById('btn-recenter').addEventListener('click', function(){
  if (state.map && state.player.lat) state.map.setView([state.player.lat, state.player.lng], 17, {animate:true});
});
document.getElementById('btn-refresh').addEventListener('click', function(){
  if (state.player.lat){ spawnNearby(state.player.lat, state.player.lng, 10); showToast('Scanning area'); }
});

function showCollection(){
  var grid = document.getElementById('coll-grid');
  grid.innerHTML = '';
  var caughtCount = 0;
  CREATURES.forEach(function(c, idx){
    var data = state.caught[c.id];
    var card = document.createElement('div');
    card.className = 'coll-card' + (data.count === 0 ? ' locked' : ' caught');
    card.style.setProperty('--c-border', c.color);
    card.style.setProperty('--c-glow', c.color+'30');
    if (data.count > 0) caughtCount++;
    var stars = '★'.repeat(c.rarity);
    card.innerHTML =
      '<div class="coll-num">#'+String(idx+1).padStart(3,'0')+'</div>'+
      '<div class="coll-rarity">'+stars+'</div>'+
      '<div class="coll-emoji">'+c.emoji+'</div>'+
      '<div class="coll-name">'+(data.count>0?c.name:'???')+'</div>'+
      '<div class="coll-meta">'+(data.count>0?('CP '+data.bestCP+' ·×'+data.count):'Undiscovered')+'</div>';
    if (data.count > 0){
      (function(cr,d){
        card.addEventListener('click', function(){ showDetail(cr,d); });
      })(c, data);
    }
    grid.appendChild(card);
  });
  document.getElementById('coll-caught').textContent = caughtCount;
  document.getElementById('coll-total').textContent = CREATURES.length;
  document.getElementById('collection').classList.add('active');
}

function showDetail(c, data){
  var d = document.getElementById('detail');
  document.getElementById('detail-card').style.setProperty('--c-border', c.color);
  document.getElementById('detail-emoji').textContent = c.emoji;
  document.getElementById('detail-name').textContent = c.name;
  var t = document.getElementById('detail-type');
  t.textContent = c.type; t.style.background = c.color; t.style.color = '#0a0a14';
  document.getElementById('detail-count').textContent = data.count;
  document.getElementById('detail-cp').textContent = data.bestCP;
  document.getElementById('detail-rarity').textContent = '★'.repeat(c.rarity);
  document.getElementById('detail-habitat').textContent = c.habitat;
  d.classList.add('show');
}
document.getElementById('detail-close').addEventListener('click', function(){
  document.getElementById('detail').classList.remove('show');
});

function showToast(msg){
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2000);
}

// ============================================================
//  BOOT
// ============================================================
window.addEventListener('load', function(){
  setupSwipe();
  updateHUD();
  updateBallCounts();
  // hard failsafe - never let splash block for more than 6s total
  setTimeout(hideSplash, 6000);
  setTimeout(startGeoTracking, 900);
});
</script>
