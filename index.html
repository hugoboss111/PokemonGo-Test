<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Cursed Slayer — AR</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
  #cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; background:#000; }
  #three { position:fixed; inset:0; width:100%; height:100%; z-index:1; touch-action:none; }
  #trail { position:fixed; inset:0; width:100%; height:100%; z-index:2; pointer-events:none; }
  #hud { position:fixed; inset:0; z-index:3; pointer-events:none; font-weight:600; letter-spacing:.04em; }

#hp { position:absolute; top:18px; left:18px; display:flex; gap:6px; }
.hpbar { width:42px; height:10px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.35); }
.hpbar.on { background:#c8102e; border-color:#ff5a70; box-shadow:0 0 12px rgba(200,16,46,.8); }

#info { position:absolute; top:14px; right:18px; text-align:right; font-size:13px; line-height:1.35; }
#info .wave { color:#ff5a70; font-size:11px; letter-spacing:.25em; }
#info .score { font-size:22px; font-weight:700; }

#combo { position:absolute; top:44%; left:0; right:0; text-align:center; font-size:54px; font-weight:900; color:#fff; text-shadow:0 0 22px rgba(200,16,46,.9), 0 0 6px #fff; opacity:0; letter-spacing:.05em; }
#combo.show { animation:comboPop 700ms ease-out forwards; }
@keyframes comboPop { 0% { opacity:0; transform:scale(.6); } 25% { opacity:1; transform:scale(1.15); } 100% { opacity:0; transform:scale(1.05) translateY(-30px); } }

#waveTitle { position:absolute; top:40%; left:0; right:0; text-align:center; font-size:22px; color:#fff; opacity:0; letter-spacing:.35em; }
#waveTitle .big { display:block; font-size:46px; font-weight:900; color:#c8102e; letter-spacing:.15em; text-shadow:0 0 18px rgba(200,16,46,.8); margin-bottom:8px; }
#waveTitle.show { animation:waveIntro 2.1s ease-out forwards; }
@keyframes waveIntro { 0% { opacity:0; transform:translateY(20px); } 20% { opacity:1; transform:translateY(0); } 80% { opacity:1; } 100% { opacity:0; } }

#hitFlash { position:absolute; inset:0; background:rgba(200,16,46,.55); opacity:0; pointer-events:none; }
#hitFlash.show { animation:hitFlash 400ms ease-out forwards; }
@keyframes hitFlash { 0% { opacity:0; } 30% { opacity:.8; } 100% { opacity:0; } }

#vignette { position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.55) 100%); }

#start, #gameover { position:fixed; inset:0; z-index:10; background:radial-gradient(ellipse at center, #1a0508 0%, #000 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
#start h1 { font-size:40px; font-weight:900; letter-spacing:.2em; color:#c8102e; text-shadow:0 0 24px rgba(200,16,46,.8); margin-bottom:14px; }
#start p, #gameover p { color:#bbb; font-size:14px; margin-bottom:28px; line-height:1.5; max-width:320px; }
#startBtn, #restartBtn { background:transparent; border:2px solid #c8102e; color:#fff; padding:16px 32px; font-size:14px; letter-spacing:.3em; font-weight:700; cursor:pointer; text-transform:uppercase; transition:background .2s; }
#startBtn:active, #restartBtn:active { background:rgba(200,16,46,.3); }
#gameover h2 { font-size:36px; font-weight:900; letter-spacing:.2em; color:#c8102e; text-shadow:0 0 24px rgba(200,16,46,.8); margin-bottom:10px; }
#gameover .count { font-size:50px; font-weight:900; color:#fff; margin:12px 0 4px; }
#gameover .label { font-size:11px; letter-spacing:.3em; color:#888; margin-bottom:28px; }

#tip { position:absolute; bottom:30px; left:0; right:0; text-align:center; font-size:11px; color:rgba(255,255,255,.55); letter-spacing:.2em; pointer-events:none; }
</style>

</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="three"></canvas>
<canvas id="trail"></canvas>

<div id="hud">
  <div id="vignette"></div>
  <div id="hp"></div>
  <div id="info">
    <div class="wave">WAVE <span id="waveNum">1</span></div>
    <div class="score" id="scoreNum">0</div>
  </div>
  <div id="combo"></div>
  <div id="waveTitle"></div>
  <div id="hitFlash"></div>
  <div id="tip">SWIPE TO CLEAVE</div>
</div>

<div id="start">
  <h1>CURSED SLAYER</h1>
  <p>An AR domain. Curses spawn around you. Swipe to bisect. Survive the waves.</p>
  <button id="startBtn">ENTER THE DOMAIN</button>
</div>

<div id="gameover" style="display:none">
  <h2>DOMAIN COLLAPSED</h2>
  <div class="count" id="finalScore">0</div>
  <div class="label">CURSES EXORCISED</div>
  <button id="restartBtn">AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
"use strict";

// ========================================================================
// GLOBALS
// ========================================================================
var scene, camera, renderer;
var trailCanvas, trailCtx;

var enemies = [];
var halves = [];
var vfx = [];
var trailPoints = [];
var comboPopups = 0;

var swipeActive = false;
var lastTime = 0;
var startTime = 0;
var cameraShake = 0;
var shakeBase = new THREE.Vector3();

var player = { hp: 3, score: 0, wave: 0, dmgCooldown: 0 };
var orient = { alpha:0, beta:0, gamma:0, available:false };
var screenOrient = 0;

var audioCtx = null;
var gameState = "start"; // "start" | "playing" | "gameover"
var waveState = "idle";  // "idle" | "intro" | "active" | "break"
var waveTimer = 0;
var enemyQueue = [];
var maxOnScreen = 8;
var bloodShardCount = 0;
var bloodShardCap = 100;

var tmpV = new THREE.Vector3();
var tmpQ = new THREE.Quaternion();
var tmpE = new THREE.Euler();
var zee = new THREE.Vector3(0, 0, 1);

var PALETTES = [
  { skin:0xa8c5cc, accent:0x4a6a70 },  // pale blue
  { skin:0xe8dcc0, accent:0x8a7a5a },  // bone
  { skin:0x7a8a6b, accent:0x3a4a2b },  // grey-green
  { skin:0x6b4a6b, accent:0x2a1a2a },  // bruised purple
  { skin:0x555a5a, accent:0x2a2d2d }   // ashen
];

var ARCHETYPES = ["mouthTorso","screamer","multiEye","hairMask","slenderStalker"];

// ========================================================================
// INIT
// ========================================================================
function init(){
  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("three"),
    alpha: true,
    antialias: true,
    powerPreference: "high-performance"
  });
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 60);
  camera.position.set(0, 1.6, 0);

  var amb = new THREE.AmbientLight(0xffffff, 0.75);
  scene.add(amb);
  var key = new THREE.DirectionalLight(0xffeedd, 0.55);
  key.position.set(3, 8, 4);
  scene.add(key);
  var rim = new THREE.DirectionalLight(0xff5a70, 0.35);
  rim.position.set(-5, 2, -3);
  scene.add(rim);

  trailCanvas = document.getElementById("trail");
  trailCtx = trailCanvas.getContext("2d");

  resize();
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function(){ setTimeout(resize, 120); });

  var root = document.getElementById("three");
  root.addEventListener("touchstart", onTouchStart, { passive:false });
  root.addEventListener("touchmove", onTouchMove, { passive:false });
  root.addEventListener("touchend", onTouchEnd, { passive:false });
  root.addEventListener("touchcancel", onTouchEnd, { passive:false });
  root.addEventListener("mousedown", onMouseDown);
  root.addEventListener("mousemove", onMouseMove);
  root.addEventListener("mouseup", onMouseUp);
  root.addEventListener("mouseleave", onMouseUp);

  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("restartBtn").addEventListener("click", function(){
    document.getElementById("gameover").style.display = "none";
    resetAndStart();
  });
}

function resize(){
  var w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  if (camera) { camera.aspect = w/h; camera.updateProjectionMatrix(); }
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  trailCanvas.width = Math.floor(w * dpr);
  trailCanvas.height = Math.floor(h * dpr);
  trailCanvas.style.width = w + "px";
  trailCanvas.style.height = h + "px";
  trailCtx.setTransform(1,0,0,1,0,0);
  trailCtx.scale(dpr, dpr);
  screenOrient = (window.screen && window.screen.orientation && typeof window.screen.orientation.angle === "number")
    ? window.screen.orientation.angle
    : (window.orientation || 0);
}

// ========================================================================
// PERMISSIONS / START
// ========================================================================
function startGame(){
  document.getElementById("startBtn").disabled = true;
  document.getElementById("startBtn").innerText = "LOADING...";

  initAudio();

  var promises = [];
  promises.push(startCamera().catch(function(e){ console.warn("cam denied", e); }));
  promises.push(startOrient().catch(function(e){ console.warn("orient denied", e); }));

  Promise.all(promises).then(function(){
    document.getElementById("start").style.display = "none";
    gameState = "playing";
    player.hp = 3; player.score = 0; player.wave = 0;
    updateHPBar(); updateScore(); updateWaveNum();
    waveState = "idle";
    waveTimer = 0.5;
  });
}

function resetAndStart(){
  // clear everything
  for (var i = enemies.length - 1; i >= 0; i--) disposeEnemy(enemies[i]);
  for (var j = halves.length - 1; j >= 0; j--) { scene.remove(halves[j].mesh); disposeTree(halves[j].mesh); }
  for (var k = vfx.length - 1; k >= 0; k--) { scene.remove(vfx[k].mesh); disposeTree(vfx[k].mesh); }
  enemies.length = 0; halves.length = 0; vfx.length = 0; enemyQueue.length = 0;
  bloodShardCount = 0;
  player.hp = 3; player.score = 0; player.wave = 0; player.dmgCooldown = 0;
  updateHPBar(); updateScore(); updateWaveNum();
  gameState = "playing";
  waveState = "idle";
  waveTimer = 0.3;
}

function startCamera(){
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return Promise.resolve();
  return navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" } },
    audio: false
  }).then(function(stream){
    var v = document.getElementById("cam");
    v.srcObject = stream;
    return v.play().catch(function(){});
  });
}

function startOrient(){
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    return DeviceOrientationEvent.requestPermission().then(function(state){
      if (state === "granted") {
        window.addEventListener("deviceorientation", onOrient, true);
        orient.available = true;
      }
    });
  } else {
    window.addEventListener("deviceorientation", onOrient, true);
    orient.available = true;
    return Promise.resolve();
  }
}

function onOrient(e){
  if (e.alpha == null) { orient.available = false; return; }
  orient.alpha = e.alpha;
  orient.beta = e.beta;
  orient.gamma = e.gamma;
  orient.available = true;
}

function updateCameraOrient(){
  if (!orient.available) return;
  var alpha = THREE.MathUtils.degToRad(orient.alpha);
  var beta = THREE.MathUtils.degToRad(orient.beta);
  var gamma = THREE.MathUtils.degToRad(orient.gamma);
  var orn = THREE.MathUtils.degToRad(screenOrient || 0);
  tmpE.set(beta, alpha, -gamma, "YXZ");
  camera.quaternion.setFromEuler(tmpE);
  camera.quaternion.multiply(new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)));
  camera.quaternion.multiply(tmpQ.setFromAxisAngle(zee, -orn));
}

// ========================================================================
// ENEMY BUILDERS — detailed, curse-like, never blocky
// ========================================================================

function matSkin(color){ return new THREE.MeshLambertMaterial({ color: color }); }
function matFlat(color){ return new THREE.MeshBasicMaterial({ color: color }); }
function matTeeth(){ return new THREE.MeshLambertMaterial({ color: 0xf0e6cf }); }

// manual capsule: cylinder + two spheres
function buildCapsule(radius, length, mat){
  var g = new THREE.Group();
  var cyl = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, length, 10, 1, false), mat);
  g.add(cyl);
  var s1 = new THREE.Mesh(new THREE.SphereGeometry(radius, 10, 8), mat);
  s1.position.y = length/2; g.add(s1);
  var s2 = new THREE.Mesh(new THREE.SphereGeometry(radius, 10, 8), mat);
  s2.position.y = -length/2; g.add(s2);
  return g;
}

function buildEye(x, y, z, size, parent, red){
  var white = new THREE.Mesh(new THREE.SphereGeometry(size, 12, 10), matFlat(red ? 0xffc8c0 : 0xf5e8d0));
  white.position.set(x, y, z); parent.add(white);
  var iris = new THREE.Mesh(new THREE.SphereGeometry(size*0.55, 10, 8), matFlat(red ? 0x8b0000 : 0x2a1a0a));
  iris.position.set(x, y, z + size*0.55); parent.add(iris);
  var pupil = new THREE.Mesh(new THREE.SphereGeometry(size*0.25, 8, 6), matFlat(0x000000));
  pupil.position.set(x, y, z + size*0.8); parent.add(pupil);
  // bloodshot veins — thin torus shards
  if (red) {
    var veinMat = matFlat(0x8b0000);
    for (var v = 0; v < 3; v++) {
      var vein = new THREE.Mesh(new THREE.TorusGeometry(size*0.75, size*0.04, 4, 12, Math.PI*0.6), veinMat);
      vein.position.set(x, y, z + size*0.3);
      vein.rotation.z = Math.random() * Math.PI * 2;
      vein.rotation.y = Math.random() * 0.4;
      parent.add(vein);
    }
  }
}

function buildTooth(w, h, d, mat){
  var shape = new THREE.Shape();
  shape.moveTo(-w/2, 0); shape.lineTo(w/2, 0); shape.lineTo(0, h); shape.closePath();
  var geo = new THREE.ExtrudeGeometry(shape, { depth:d, bevelEnabled:false });
  return new THREE.Mesh(geo, mat);
}

function buildTeethRow(count, spread, y, z, flip, mat, parent, jitter){
  var tw = spread / count * 0.9;
  for (var i = 0; i < count; i++) {
    var th = 0.08 + (jitter ? Math.random()*0.06 : 0.04);
    var t = buildTooth(tw, th, 0.04, mat);
    t.position.set(-spread/2 + (i+0.5)*(spread/count), y, z);
    if (flip) { t.rotation.x = Math.PI; t.position.y += th; }
    t.rotation.z = (Math.random() - 0.5) * 0.25;
    parent.add(t);
  }
}

function buildGroundShadow(radius){
  var g = new THREE.Mesh(
    new THREE.CircleGeometry(radius, 16),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.35, depthWrite:false })
  );
  g.rotation.x = -Math.PI/2;
  g.position.y = 0.01;
  return g;
}

// --- 1. Mouth-Torso Curse ---
function buildMouthTorso(palette){
  var root = new THREE.Group();
  var upper = new THREE.Group();
  var lower = new THREE.Group();
  root.add(upper); root.add(lower);

  var skin = matSkin(palette.skin);
  var accent = matSkin(palette.accent);
  var teeth = matTeeth();
  var dark = matFlat(0x1a0404);

  // torso — distorted elongated sphere (not a box)
  var torso = new THREE.Mesh(new THREE.SphereGeometry(0.55, 14, 12), skin);
  torso.scale.set(1.0, 1.4, 0.75);
  torso.position.y = 0.95;
  upper.add(torso);

  // flesh ridges across torso
  for (var r = 0; r < 4; r++) {
    var ridge = new THREE.Mesh(new THREE.TorusGeometry(0.42 - r*0.02, 0.03, 5, 16, Math.PI), accent);
    ridge.position.set(0, 1.1 + r*0.12, 0.35);
    ridge.rotation.x = Math.PI/2;
    upper.add(ridge);
  }

  // chest mouth cavity (dark interior)
  var cavity = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 10, 0, Math.PI*2, 0, Math.PI/2), dark);
  cavity.position.set(0, 0.95, 0.25);
  cavity.scale.set(1.1, 0.9, 0.6);
  cavity.rotation.x = -Math.PI/2;
  upper.add(cavity);

  // 3 rows of staggered teeth on torso mouth
  var mouthAnchor = new THREE.Group();
  mouthAnchor.position.set(0, 0.95, 0.3);
  upper.add(mouthAnchor);
  buildTeethRow(7, 0.7, 0.3, 0.15, false, teeth, mouthAnchor, true); // top row
  buildTeethRow(6, 0.65, 0.05, 0.17, true, teeth, mouthAnchor, true); // mid inverted
  buildTeethRow(8, 0.72, -0.3, 0.15, false, teeth, mouthAnchor, true); // bottom

  // vestigial head on top
  var head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 10), skin);
  head.position.y = 1.75;
  head.scale.set(0.9, 1.1, 0.95);
  upper.add(head);

  // single oversized eye with bloodshot
  buildEye(0, 1.78, 0.18, 0.14, upper, true);

  // stubby arms
  for (var s = -1; s <= 1; s += 2) {
    var shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.14, 10, 8), accent);
    shoulder.position.set(s*0.5, 1.35, 0);
    upper.add(shoulder);
    var arm = buildCapsule(0.09, 0.4, skin);
    arm.position.set(s*0.55, 1.05, 0);
    arm.rotation.z = s * 0.35;
    arm.rotation.x = 0.3;
    upper.add(arm);
    var hand = new THREE.Mesh(new THREE.SphereGeometry(0.11, 10, 8), skin);
    hand.position.set(s*0.72, 0.78, 0.15);
    upper.add(hand);
    // claw fingers
    for (var f = 0; f < 3; f++) {
      var claw = new THREE.Mesh(new THREE.ConeGeometry(0.022, 0.11, 6), accent);
      claw.position.set(s*0.72 + (f-1)*0.04, 0.68, 0.22);
      claw.rotation.x = Math.PI;
      upper.add(claw);
    }
  }

  // hip joint
  var hip = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 10), accent);
  hip.position.y = 0.42;
  hip.scale.set(1.0, 0.7, 0.85);
  lower.add(hip);

  // legs
  for (var sl = -1; sl <= 1; sl += 2) {
    var thigh = buildCapsule(0.12, 0.35, skin);
    thigh.position.set(sl*0.18, 0.22, 0);
    lower.add(thigh);
    var shin = buildCapsule(0.1, 0.28, skin);
    shin.position.set(sl*0.18, -0.08, 0);
    lower.add(shin);
    var foot = new THREE.Mesh(new THREE.SphereGeometry(0.14, 10, 8), accent);
    foot.position.set(sl*0.18, -0.22, 0.08);
    foot.scale.set(1, 0.5, 1.5);
    lower.add(foot);
  }

  lower.add(buildGroundShadow(0.55));

  return { root:root, upper:upper, lower:lower, cutY:0.65, archetype:"mouthTorso" };
}

// --- 2. Screamer ---
function buildScreamer(palette){
  var root = new THREE.Group();
  var upper = new THREE.Group();
  var lower = new THREE.Group();
  root.add(upper); root.add(lower);

  var skin = matSkin(0xe8dcc0); // always bone-white
  var teeth = matTeeth();
  var dark = matFlat(0x080808);

  // thin elongated torso
  var torso = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.28, 1.0, 10, 1), skin);
  torso.position.y = 1.1;
  upper.add(torso);

  // ribcage ridges
  for (var ri = 0; ri < 5; ri++) {
    var rib = new THREE.Mesh(new THREE.TorusGeometry(0.22 + ri*0.005, 0.02, 4, 12, Math.PI), matSkin(0xc8bc9a));
    rib.position.set(0, 0.8 + ri*0.12, 0.18);
    rib.rotation.x = Math.PI/2;
    upper.add(rib);
  }

  // head — large elongated sphere, mostly mouth
  var head = new THREE.Mesh(new THREE.SphereGeometry(0.42, 14, 12), skin);
  head.position.y = 1.95;
  head.scale.set(0.9, 1.2, 0.95);
  upper.add(head);

  // gaping mouth silhouette — ShapeGeometry
  var mouthShape = new THREE.Shape();
  mouthShape.moveTo(-0.3, 0.35);
  mouthShape.bezierCurveTo(-0.35, 0.1, -0.3, -0.15, -0.15, -0.35);
  mouthShape.bezierCurveTo(-0.05, -0.45, 0.05, -0.45, 0.15, -0.35);
  mouthShape.bezierCurveTo(0.3, -0.15, 0.35, 0.1, 0.3, 0.35);
  mouthShape.lineTo(-0.3, 0.35);
  var mouthGeo = new THREE.ExtrudeGeometry(mouthShape, { depth:0.25, bevelEnabled:false });
  var mouth = new THREE.Mesh(mouthGeo, dark);
  mouth.position.set(0, 1.85, 0.18);
  upper.add(mouth);

  // jaw hangs down low
  var jaw = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 10), skin);
  jaw.scale.set(1.0, 0.55, 1.0);
  jaw.position.set(0, 1.45, 0.15);
  upper.add(jaw);

  // uneven teeth all around the mouth
  for (var t = 0; t < 14; t++) {
    var angle = (t / 14) * Math.PI * 2;
    var rr = 0.26 + Math.random() * 0.04;
    var toothShape = new THREE.Shape();
    toothShape.moveTo(-0.025, 0); toothShape.lineTo(0.025, 0);
    toothShape.lineTo(0, 0.07 + Math.random()*0.04); toothShape.closePath();
    var tg = new THREE.ExtrudeGeometry(toothShape, { depth:0.04, bevelEnabled:false });
    var tooth = new THREE.Mesh(tg, teeth);
    tooth.position.set(Math.sin(angle)*rr, 1.85 + Math.cos(angle)*0.35, 0.35);
    tooth.rotation.z = -angle;
    upper.add(tooth);
  }

  // hollow eye sockets — just dark recessed spheres
  for (var se = -1; se <= 1; se += 2) {
    var sock = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 8), dark);
    sock.position.set(se*0.15, 2.15, 0.3);
    upper.add(sock);
  }

  // skinny arms
  for (var sa = -1; sa <= 1; sa += 2) {
    var a1 = buildCapsule(0.06, 0.55, skin);
    a1.position.set(sa*0.32, 1.15, 0);
    a1.rotation.z = sa * 0.1;
    upper.add(a1);
    var a2 = buildCapsule(0.055, 0.5, skin);
    a2.position.set(sa*0.42, 0.65, 0.08);
    a2.rotation.z = sa * 0.3;
    upper.add(a2);
    // long clawed fingers
    for (var fi = 0; fi < 4; fi++) {

// ========================================================================
// ENEMY SPAWN / AI
// ========================================================================
function spawnEnemy(archetype){
  var palette = PALETTES[Math.floor(Math.random()*PALETTES.length)];
  var built;
  if (archetype === "mouthTorso") built = buildMouthTorso(palette);
  else if (archetype === "screamer") built = buildScreamer(palette);
  else if (archetype === "multiEye") built = buildMultiEye(palette);
  else if (archetype === "hairMask") built = buildHairMask(palette);
  else built = buildSlenderStalker(palette);

  var scale = 0.85 + Math.random() * 0.45;
  built.root.scale.setScalar(scale);

  // spawn position — random azimuth around camera, 5-8m out
  var azi = Math.random() * Math.PI * 2;
  var dist = 5 + Math.random() * 3;
  // spawn in front-half arc if orientation unavailable (so player sees them)
  if (!orient.available) azi = (Math.random() - 0.5) * Math.PI * 1.2;
  built.root.position.set(
    camera.position.x + Math.sin(azi) * dist,
    0,
    camera.position.z + Math.cos(azi) * dist
  );
  built.root.rotation.y = Math.atan2(camera.position.x - built.root.position.x, camera.position.z - built.root.position.z);

  built.health = (archetype === "multiEye" && player.wave >= 5) ? 2 : 1;
  built.speed = 0.6 + Math.random() * 0.3;
  if (archetype === "slenderStalker" && player.wave >= 3) built.speed = 1.3 + Math.random() * 0.3;
  built.phase = Math.random() * Math.PI * 2;
  built.scale = scale;
  built.sliced = false;
  built.hurtFlash = 0;
  built.spawnTime = performance.now() / 1000;
  built.cutYWorld = built.cutY * scale;

  scene.add(built.root);
  enemies.push(built);

  playSpawn();
}

function updateEnemies(dt){
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (e.sliced) continue;

    // direction toward player on xz plane
    var dx = camera.position.x - e.root.position.x;
    var dz = camera.position.z - e.root.position.z;
    var d = Math.sqrt(dx*dx + dz*dz);

    if (d > 1.0) {
      var spd = e.speed * dt;
      e.root.position.x += (dx/d) * spd;
      e.root.position.z += (dz/d) * spd;
    } else {
      // damage player
      if (player.dmgCooldown <= 0) {
        damagePlayer();
        player.dmgCooldown = 1.2;
      }
    }

    // face player
    e.root.rotation.y = Math.atan2(dx, dz);

    // breathing / animation
    var t = performance.now() / 1000 + e.phase;
    var breath = Math.sin(t * 2.2) * 0.03;
    e.upper.scale.set(1 + breath, 1 + breath*0.7, 1 + breath);
    // walk sway
    e.root.rotation.z = Math.sin(t * 3.2) * 0.03;
    // aggro close range
    if (d < 2.0) {
      e.upper.scale.multiplyScalar(1.04);
    }

    // hurt flash
    if (e.hurtFlash > 0) {
      e.hurtFlash -= dt;
      // flicker is visual-only; skip if too expensive
    }
  }
}

function disposeEnemy(e){
  scene.remove(e.root);
  disposeTree(e.root);
  var idx = enemies.indexOf(e);
  if (idx >= 0) enemies.splice(idx, 1);
}

function disposeTree(obj){
  obj.traverse(function(ch){
    if (ch.geometry) ch.geometry.dispose();
    if (ch.material) {
      if (Array.isArray(ch.material)) ch.material.forEach(function(m){ m.dispose(); });
      else ch.material.dispose();
    }
  });
}

function onTouchStart(ev){
  ev.preventDefault();
  if (gameState !== "playing") return;
  var t = ev.touches[0];
  trailPoints.length = 0;
  trailPoints.push({ x:t.clientX, y:t.clientY, t:performance.now() });
  swipeActive = true;
}
function onTouchMove(ev){
  ev.preventDefault();
  if (!swipeActive) return;
  for (var i = 0; i < ev.touches.length; i++) {
    var t = ev.touches[i];
    trailPoints.push({ x:t.clientX, y:t.clientY, t:performance.now() });
  }
  if (trailPoints.length > 48) trailPoints.splice(0, trailPoints.length - 48);
}
function onTouchEnd(ev){
  ev.preventDefault();
  if (!swipeActive) return;
  swipeActive = false;
  evaluateSwipe();
}

function onMouseDown(ev){
  if (gameState !== "playing") return;
  trailPoints.length = 0;
  trailPoints.push({ x:ev.clientX, y:ev.clientY, t:performance.now() });
  swipeActive = true;
}
function onMouseMove(ev){
  if (!swipeActive) return;
  trailPoints.push({ x:ev.clientX, y:ev.clientY, t:performance.now() });
  if (trailPoints.length > 48) trailPoints.splice(0, trailPoints.length - 48);
}

  if (!swipeActive) return;

}

// ========================================================================
// SWIPE EVAL + HIT DETECTION + SLICE
// ========================================================================
function projectToScreen(worldPos){
  tmpV.copy(worldPos).project(camera);
  return {
    x: (tmpV.x + 1) * 0.5 * window.innerWidth,
    y: (1 - tmpV.y) * 0.5 * window.innerHeight,
    z: tmpV.z
  };
}

function segmentPointDist(ax, ay, bx, by, px, py){
  var dx = bx-ax, dy = by-ay;
  var len2 = dx*dx + dy*dy;
  if (len2 < 0.0001) {
    var pdx = px-ax, pdy = py-ay;
    return Math.sqrt(pdx*pdx + pdy*pdy);
  }
  var tt = ((px-ax)*dx + (py-ay)*dy) / len2;
  tt = tt < 0 ? 0 : (tt > 1 ? 1 : tt);
  var cx = ax + tt*dx, cy = ay + tt*dy;
  var ddx = px-cx, ddy = py-cy;
  return Math.sqrt(ddx*ddx + ddy*ddy);
}

function evaluateSwipe(){
  if (trailPoints.length < 2) return;
  var first = trailPoints[0];
  var last = trailPoints[trailPoints.length-1];
  var sdx = last.x - first.x, sdy = last.y - first.y;
  var slen = Math.sqrt(sdx*sdx + sdy*sdy);
  var dur = last.t - first.t;
  if (slen < 60 || dur > 700) return;

  var dirX = sdx / slen, dirY = sdy / slen;

  var hits = [];
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.sliced) continue;
    tmpV.set(e.root.position.x, e.root.position.y + e.cutYWorld, e.root.position.z);
    var dist = tmpV.distanceTo(camera.position);
    if (dist > 9) continue;
    var sp = projectToScreen(tmpV);
    if (sp.z > 1 || sp.z < -1) continue;

    // generous hit radius — scale with apparent size
    var hitRadius = Math.max(55, 280 / Math.max(0.8, dist));

    var hit = false;
    for (var j = 0; j < trailPoints.length - 1; j++) {
      var a = trailPoints[j], b = trailPoints[j+1];
      var dd = segmentPointDist(a.x, a.y, b.x, b.y, sp.x, sp.y);
      if (dd < hitRadius) { hit = true; break; }
    }
    if (hit) hits.push({ enemy:e, screenPos:sp });
  }

  if (hits.length === 0) return;

  for (var h = 0; h < hits.length; h++) {
    sliceEnemy(hits[h].enemy, dirX, dirY, hits.length);
  }
  if (hits.length > 1) showCombo(hits.length);
}

function sliceEnemy(e, dirX, dirY, comboSize){
  if (e.health > 1) {
    e.health--;
    e.hurtFlash = 0.25;
    playCrunch();
    cameraShake = Math.max(cameraShake, 0.02);
    if (navigator.vibrate) navigator.vibrate(15);
    // small blood spurt
    tmpV.set(e.root.position.x, e.root.position.y + e.cutYWorld, e.root.position.z);
    spawnBloodMist(tmpV, 8);
    return;
  }

  e.sliced = true;

  // world-space cut point
  var cutPoint = new THREE.Vector3(
    e.root.position.x,
    e.root.position.y + e.cutYWorld,
    e.root.position.z
  );

  // derive a 3D "apart" direction from swipe direction
  var a = new THREE.Vector3(0, 0, 0.5);
  var b = new THREE.Vector3(dirX * 0.35, -dirY * 0.35, 0.5);
  a.unproject(camera);
  b.unproject(camera);
  var swipeDir3 = b.sub(a).normalize();
  var viewDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  var perp = new THREE.Vector3().crossVectors(swipeDir3, viewDir).normalize();
  if (perp.lengthSq() < 0.01) perp.set(1, 0, 0);

  // detach halves preserving world transform
  scene.attach(e.upper);
  scene.attach(e.lower);

  setTransparent(e.upper);
  setTransparent(e.lower);

  halves.push({
    mesh: e.upper,
    vel: perp.clone().multiplyScalar(2.5 + Math.random()).add(new THREE.Vector3(0, 2.2, 0)),
    angVel: new THREE.Vector3((Math.random()-0.5)*6, (Math.random()-0.5)*6, (Math.random()-0.5)*6),
    life: 1.3, maxLife: 1.3
  });
  halves.push({
    mesh: e.lower,
    vel: perp.clone().multiplyScalar(-(2.5 + Math.random())).add(new THREE.Vector3(0, 1.1, 0)),
    angVel: new THREE.Vector3((Math.random()-0.5)*6, (Math.random()-0.5)*6, (Math.random()-0.5)*6),
    life: 1.3, maxLife: 1.3
  });

  // remove original root
  scene.remove(e.root);
  var idx = enemies.indexOf(e);
  if (idx >= 0) enemies.splice(idx, 1);

  // VFX
  spawnCrescent(cutPoint, swipeDir3, viewDir);
  spawnBloodMist(cutPoint, 22);
  spawnShockwave(cutPoint, viewDir);
  addCutGlow(e.upper, cutPoint);
  addCutGlow(e.lower, cutPoint);

  // feedback
  cameraShake = Math.max(cameraShake, 0.05);
  if (navigator.vibrate) navigator.vibrate(comboSize > 1 ? [10,30,10] : 22);
  playShing();

  player.score += 100 * comboSize;
  updateScore();
}

function setTransparent(obj){
  obj.traverse(function(ch){
    if (ch.material) {
      if (Array.isArray(ch.material)) ch.material.forEach(function(m){ m.transparent = true; });
      else ch.material.transparent = true;
    }
  });
}

function fadeTree(obj, alpha){
  obj.traverse(function(ch){
    if (ch.material) {
      if (Array.isArray(ch.material)) ch.material.forEach(function(m){ m.opacity = alpha; });
      else ch.material.opacity = alpha;
    }
  });
}

function updateHalves(dt){
  for (var i = halves.length - 1; i >= 0; i--) {
    var h = halves[i];
    h.life -= dt;
    if (h.life <= 0) {
      scene.remove(h.mesh);
      disposeTree(h.mesh);
      halves.splice(i, 1);
      continue;
    }
    // gravity
    h.vel.y -= 9.8 * dt;
    h.mesh.position.x += h.vel.x * dt;
    h.mesh.position.y += h.vel.y * dt;
    h.mesh.position.z += h.vel.z * dt;
    h.mesh.rotation.x += h.angVel.x * dt;
    h.mesh.rotation.y += h.angVel.y * dt;
    h.mesh.rotation.z += h.angVel.z * dt;
    fadeTree(h.mesh, Math.max(0, h.life / h.maxLife));
  }
}

// ========================================================================
// VFX: crescent, blood mist, shockwave, cut glow
// ========================================================================
function spawnCrescent(pos, swipeDir3, viewDir){
  var shape = new THREE.Shape();
  var r1 = 0.9, r2 = 0.6;
  var arc = Math.PI * 0.7;
  var steps = 24;
  for (var i = 0; i <= steps; i++) {
    var a = -arc/2 + (i/steps) * arc;
    if (i === 0) shape.moveTo(Math.sin(a)*r1, Math.cos(a)*r1 - r1*0.4);
    else shape.lineTo(Math.sin(a)*r1, Math.cos(a)*r1 - r1*0.4);
  }
  for (var j = steps; j >= 0; j--) {
    var aa = -arc/2 + (j/steps) * arc;
    shape.lineTo(Math.sin(aa)*r2, Math.cos(aa)*r2 - r1*0.4);
  }

  var geo = new THREE.ShapeGeometry(shape);
  var mat = new THREE.MeshBasicMaterial({
    color: 0xff2040, transparent:true, opacity:1,
    blending: THREE.AdditiveBlending, depthWrite:false,
    side: THREE.DoubleSide
  });
  var crescent = new THREE.Mesh(geo, mat);
  crescent.position.copy(pos);
  crescent.quaternion.copy(camera.quaternion);

  // orient along swipe direction in camera plane
  var angle = Math.atan2(swipeDir3.y, swipeDir3.x);
  crescent.rotateZ(angle);

  crescent.scale.setScalar(0.05);
  scene.add(crescent);

  // inner white-hot stroke
  var innerMat = new THREE.MeshBasicMaterial({
    color: 0xfff0e0, transparent:true, opacity:1,
    blending: THREE.AdditiveBlending, depthWrite:false,
    side: THREE.DoubleSide
  });
  var inner = new THREE.Mesh(geo, innerMat);
  inner.position.copy(pos);
  inner.quaternion.copy(crescent.quaternion);
  inner.scale.setScalar(0.05 * 0.6);
  scene.add(inner);

  vfx.push({ type:"crescent", mesh:crescent, inner:inner, life:0.28, maxLife:0.28, phase:"grow" });
}

function spawnBloodMist(pos, count){
  for (var i = 0; i < count; i++) {
    if (bloodShardCount >= bloodShardCap) break;
    var sz = 0.04 + Math.random() * 0.06;
    var geo = new THREE.PlaneGeometry(sz, sz * (0.6 + Math.random()*0.8));
    var mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(0.0, 0.9, 0.15 + Math.random() * 0.3),
      transparent:true, opacity:1,
      depthWrite:false,
      side: THREE.DoubleSide
    });
    var shard = new THREE.Mesh(geo, mat);
    shard.position.copy(pos);
    shard.position.x += (Math.random()-0.5) * 0.1;
    shard.position.y += (Math.random()-0.5) * 0.1;
    shard.position.z += (Math.random()-0.5) * 0.1;
    scene.add(shard);
    var speed = 2 + Math.random() * 3;
    var vx = (Math.random()-0.5) * speed;
    var vy = 1 + Math.random() * 3;
    var vz = (Math.random()-0.5) * speed;
    vfx.push({
      type:"shard", mesh:shard,
      vel:new THREE.Vector3(vx, vy, vz),
      life: 0.7 + Math.random()*0.3, maxLife:1.0,
      isShard: true
    });
    bloodShardCount++;
  }
}

function spawnShockwave(pos, viewDir){
  var geo = new THREE.RingGeometry(0.1, 0.15, 32);
  var mat = new THREE.MeshBasicMaterial({
    color: 0xff3040, transparent:true, opacity:0.9,
    blending: THREE.AdditiveBlending, depthWrite:false,
    side: THREE.DoubleSide
  });
  var ring = new THREE.Mesh(geo, mat);
  ring.position.copy(pos);
  ring.quaternion.copy(camera.quaternion);
  scene.add(ring);
  vfx.push({ type:"shockwave", mesh:ring, life:0.35, maxLife:0.35 });
}

function addCutGlow(halfGroup, worldCutPoint){
  var geo = new THREE.PlaneGeometry(0.8, 0.12);
  var mat = new THREE.MeshBasicMaterial({
    color: 0xff1028, transparent:true, opacity:0,
    blending: THREE.AdditiveBlending, depthWrite:false,
    side: THREE.DoubleSide
  });
  var glow = new THREE.Mesh(geo, mat);
  halfGroup.worldToLocal(glow.position.copy(worldCutPoint));
  halfGroup.add(glow);
  vfx.push({ type:"cutGlow", mesh:glow, life:0.5, maxLife:0.5, parent:halfGroup });
}

function updateVFX(dt){
  for (var i = vfx.length - 1; i >= 0; i--) {
    var v = vfx[i];
    v.life -= dt;
    if (v.life <= 0) {
      if (v.type === "cutGlow" && v.parent) { v.parent.remove(v.mesh); }
      else { scene.remove(v.mesh); }
      if (v.inner) scene.remove(v.inner);
      disposeTree(v.mesh);
      if (v.inner) disposeTree(v.inner);
      if (v.isShard) bloodShardCount--;
      vfx.splice(i, 1);
      continue;
    }
    var t = 1 - v.life / v.maxLife;

    if (v.type === "crescent") {
      var s;
      if (t < 0.25) { s = 1.5 * (t / 0.25); }
      else { s = 1.5; v.mesh.material.opacity = (1 - (t - 0.25)/0.75); v.inner.material.opacity = (1 - (t - 0.25)/0.75); }
      v.mesh.scale.setScalar(s);
      v.inner.scale.setScalar(s * 0.7);
      // billboard to camera
      v.mesh.quaternion.copy(camera.quaternion);
      v.inner.quaternion.copy(camera.quaternion);
    } else if (v.type === "shard") {
      v.vel.y -= 9.8 * dt;
      v.mesh.position.x += v.vel.x * dt;
      v.mesh.position.y += v.vel.y * dt;
      v.mesh.position.z += v.vel.z * dt;
      v.mesh.quaternion.copy(camera.quaternion); // billboard
      v.mesh.material.opacity = v.life / v.maxLife;
      v.mesh.scale.setScalar(Math.max(0.2, v.life / v.maxLife));
    } else if (v.type === "shockwave") {
      var sc = 0.3 + t * 2.2;
      v.mesh.scale.setScalar(sc);
      v.mesh.material.opacity = (1 - t) * 0.9;
      v.mesh.quaternion.copy(camera.quaternion);
    } else if (v.type === "cutGlow") {
      if (t < 0.3) v.mesh.material.opacity = t / 0.3;
      else v.mesh.material.opacity = (1 - (t - 0.3)/0.7);
    }
  }
}

// ========================================================================
// TRAIL (2D canvas overlay)
// ========================================================================
function drawTrail(){
  trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  if (trailPoints.length < 2) return;
  var now = performance.now();
  // prune old
  while (trailPoints.length > 0 && now - trailPoints[0].t > 260) trailPoints.shift();
  if (trailPoints.length < 2) return;

  trailCtx.lineCap = "round";
  trailCtx.lineJoin = "round";

  // 3 passes: wide outer glow, mid crimson, inner white-hot
  var passes = [
    { extra: 10, color: "rgba(200,16,46,", alphaScale: 0.35, widthScale: 1.0 },
    { extra: 0,  color: "rgba(255,40,66,",  alphaScale: 1.0,  widthScale: 1.0 },
    { extra: 0,  color: "rgba(255,240,224,", alphaScale: 1.0,  widthScale: 0.32 }
  ];

  for (var p = 0; p < passes.length; p++) {
    var pass = passes[p];
    for (var i = 0; i < trailPoints.length - 1; i++) {
      var a = trailPoints[i], b = trailPoints[i+1];
      var ageA = (now - a.t) / 260;
      var ageB = (now - b.t) / 260;
      var tA = 1 - ageA, tB = 1 - ageB;
      var width = 2 + tB * 26;
      // turbulence
      var wob = Math.sin(now * 0.02 + i * 0.5) * 1.5;
      var alpha = Math.min(1, tB) * pass.alphaScale;
      trailCtx.strokeStyle = pass.color + alpha.toFixed(3) + ")";
      trailCtx.lineWidth = (width + pass.extra) * pass.widthScale;
      trailCtx.beginPath();
      trailCtx.moveTo(a.x, a.y);
      trailCtx.lineTo(b.x + wob*0.3, b.y);
      trailCtx.stroke();
    }
  }
}

// ========================================================================
// WAVES / GAME LOOP
// ========================================================================
function nextWave(){
  player.wave++;
  updateWaveNum();
  var count = 4 + player.wave * 2;
  if (count > 30) count = 30;
  enemyQueue.length = 0;
  for (var i = 0; i < count; i++) {
    var pool = ["mouthTorso","screamer","multiEye","hairMask"];
    if (player.wave >= 3) pool.push("slenderStalker");
    if (player.wave >= 2) pool.push("mouthTorso"); // weight commons
    enemyQueue.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  showWaveTitle(player.wave);
  playWaveStart();
  waveState = "intro";
  waveTimer = 2.0;
}

function updateWaves(dt){
  if (gameState !== "playing") return;
  waveTimer -= dt;

  if (waveState === "idle" && waveTimer <= 0) {
    nextWave();
  } else if (waveState === "intro" && waveTimer <= 0) {
    waveState = "active";
    waveTimer = 0;
  } else if (waveState === "active") {
    if (waveTimer <= 0 && enemyQueue.length > 0 && enemies.length < maxOnScreen) {
      var archetype = enemyQueue.shift();
      spawnEnemy(archetype);
      waveTimer = 0.8 + Math.random() * 0.8;
    }
    if (enemyQueue.length === 0 && enemies.length === 0) {
      waveState = "break";
      waveTimer = 1.8;
    }
  } else if (waveState === "break" && waveTimer <= 0) {
    waveState = "idle";
    waveTimer = 0.4;
  }
}

function damagePlayer(){
  player.hp--;
  updateHPBar();
  var hf = document.getElementById("hitFlash");
  hf.classList.remove("show");
  void hf.offsetWidth;
  hf.classList.add("show");
  if (navigator.vibrate) navigator.vibrate(80);
  cameraShake = Math.max(cameraShake, 0.08);
  if (player.hp <= 0) {
    gameOver();
  }
}

function gameOver(){
  gameState = "gameover";
  document.getElementById("finalScore").innerText = player.score;
  document.getElementById("gameover").style.display = "flex";
}

// HUD updates
function updateHPBar(){
  var c = document.getElementById("hp");
  c.innerHTML = "";
  for (var i = 0; i < 3; i++) {
    var b = document.createElement("div");
    b.className = "hpbar" + (i < player.hp ? " on" : "");
    c.appendChild(b);
  }
}
function updateScore(){ document.getElementById("scoreNum").innerText = player.score; }
function updateWaveNum(){ document.getElementById("waveNum").innerText = player.wave || 1; }

var waveMessages = ["STEP INTO THE DOMAIN","THE CURSED STIR","THEY CLOSE IN","BLOOD IN THE AIR","A RISING HUNGER","NO MERCY","THE DOMAIN BENDS","HIGHER CURSES APPROACH"];
function showWaveTitle(n){
  var el = document.getElementById("waveTitle");
  el.innerHTML = '<span class="big">WAVE ' + n + '</span>' + (waveMessages[(n-1) % waveMessages.length] || "THEY COME");
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
}

function showCombo(n){
  var el = document.getElementById("combo");
  el.innerText = "×" + n + "!";
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
}

// ========================================================================
// AUDIO (procedural)
// ========================================================================
function initAudio(){
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch(e) { audioCtx = null; }
}

function playShing(){
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  var f = audioCtx.createBiquadFilter();
  o.type = "sawtooth";
  o.frequency.setValueAtTime(1200, t);
  o.frequency.exponentialRampToValueAtTime(180, t + 0.09);
  f.type = "lowpass";
  f.frequency.setValueAtTime(4000, t);
  f.frequency.exponentialRampToValueAtTime(800, t + 0.09);
  g.gain.setValueAtTime(0.28, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
  o.connect(f); f.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.13);

  // layer noise "crunch"
  playCrunch();
}

function playCrunch(){
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var bufferSize = audioCtx.sampleRate * 0.05;
  var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  var data = buffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
  var src = audioCtx.createBufferSource();
  src.buffer = buffer;
  var f = audioCtx.createBiquadFilter();
  f.type = "lowpass";
  f.frequency.value = 1600;
  var g = audioCtx.createGain();
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
  src.connect(f); f.connect(g); g.connect(audioCtx.destination);
  src.start(t);
}

function playSpawn(){
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(70, t);
  var lfo = audioCtx.createOscillator(); lfo.frequency.value = 6;
  var lfoG = audioCtx.createGain(); lfoG.gain.value = 8;
  lfo.connect(lfoG); lfoG.connect(o.frequency);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); lfo.start(t); o.stop(t + 0.5); lfo.stop(t + 0.5);
}

function playHurtSound(){ playCrunch(); }

function playWaveStart(){
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = "triangle";
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(480, t + 0.6);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.18, t + 0.1);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.85);
}

// ========================================================================
// MAIN LOOP
// ========================================================================
function animate(now){
  requestAnimationFrame(animate);
  if (!now) now = performance.now();
  var dt = Math.min(0.05, (now - lastTime) / 1000);
  if (!lastTime) dt = 0;
  lastTime = now;

  if (gameState === "playing") {
    updateCameraOrient();

    // camera shake
    if (cameraShake > 0) {
      var sh = cameraShake;
      camera.position.x = (Math.random()-0.5) * sh;
      camera.position.y = 1.6 + (Math.random()-0.5) * sh;
      camera.position.z = (Math.random()-0.5) * sh;
      cameraShake -= dt * 0.8;
      if (cameraShake < 0) cameraShake = 0;
    } else {
      camera.position.set(0, 1.6, 0);
    }

    if (player.dmgCooldown > 0) player.dmgCooldown -= dt;

    updateEnemies(dt);
    updateHalves(dt);
    updateVFX(dt);
    updateWaves(dt);
  }

  drawTrail();
  renderer.render(scene, camera);
}

// ========================================================================
// BOOT
// ========================================================================
init();
requestAnimationFrame(animate);
</script>
